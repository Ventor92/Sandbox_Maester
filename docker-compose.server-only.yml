version: '3.8'

services:
  # Main server only - no clients
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: dice-roller-server
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  dice-network:
    driver: bridge
